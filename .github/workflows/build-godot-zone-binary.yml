name: Build Godot zone binary and push to GHCR

# Builds the zone server runtime (double precision, template_release, no Mono)
# from V-Sekai-fire/multiplayer-fabric-build and pushes to ghcr.io/v-sekai-fire/godot-zone-double.
# Zone servers import nothing — template_release is smaller and faster than editor.

on:
  workflow_dispatch:
  schedule:
    # Weekly on Mondays alongside the editor binary build
    - cron: "0 3 * * 1"

jobs:
  build-godot-zone:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout baker repo
        uses: actions/checkout@v6

      - name: Checkout world-godot source
        uses: actions/checkout@v6
        with:
          repository: V-Sekai-fire/multiplayer-fabric-build
          ref: b27142e94c755c771e97d38bd4cdcb3bc97ba2dc
          path: godot-src
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get world-godot commit SHA
        id: godot-sha
        run: echo "sha=$(git -C godot-src rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Godot zone runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/godot-zone/Dockerfile
          build-contexts: |
            godot-src=godot-src
          push: true
          tags: |
            ghcr.io/v-sekai-fire/godot-zone-double:latest
            ghcr.io/v-sekai-fire/godot-zone-double:${{ steps.godot-sha.outputs.sha }}
          cache-from: type=gha,scope=godot-zone
          cache-to: type=gha,mode=max,scope=godot-zone
