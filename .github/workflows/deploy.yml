name: Build and push baker image

on:
  # Only trigger manually — the baker image depends on the Godot editor binary
  # (ghcr.io/v-sekai-fire/godot-editor-double) which is built separately by
  # build-godot-binary.yml and takes ~1 hour. Auto-deploying on push will fail
  # until that image exists.
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Godot binary and push to GHCR"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only run when triggered manually, or when the binary build succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to GHCR (to pull pre-built Godot editor binary)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Fly registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Pull Godot editor binary from GHCR into local cache
        run: docker pull ghcr.io/v-sekai-fire/godot-editor-double:latest

      - name: Build and deploy baker image
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --app multiplayer-fabric-baker --local-only
