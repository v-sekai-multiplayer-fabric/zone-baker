name: Build and push baker image

# Builds the baker image (FROM ghcr.io/v-sekai-multiplayer-fabric/godot-editor-double)
# and pushes to ghcr.io/v-sekai-multiplayer-fabric/zone-baker. Consumed by the
# infra repo's tofu apply, not by flyctl any more.
#
# The engine base image lives in v-sekai-multiplayer-fabric/godot-images
# (single source of truth, matrix-built editor + runtime). When that repo
# publishes a new editor image it can fire `repository_dispatch` event
# `engine-updated` here to trigger a fresh baker build.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "fly.toml"
      - "LICENSE"
  repository_dispatch:
    types: [engine-updated]

concurrency:
  group: build-baker-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/v-sekai-multiplayer-fabric/zone-baker
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=zone-baker
          cache-to: type=gha,mode=max,scope=zone-baker
