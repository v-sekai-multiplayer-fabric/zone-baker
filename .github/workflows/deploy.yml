name: Build and push baker image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # pull pre-built Godot binary from GHCR

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to GHCR (to pull pre-built Godot)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and deploy baker image
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Build locally (not --remote-only) so the GitHub Actions runner can
        # pull ghcr.io/v-sekai-fire/godot-editor-double (private image) using
        # the GITHUB_TOKEN logged in above. Fly's remote builder has no GHCR auth.
        run: flyctl deploy --app multiplayer-fabric-baker --local-only
