name: Build Godot binary and push to GHCR

# Builds the V-Sekai custom Godot editor (double precision, headless) from
# V-Sekai-fire/multiplayer-fabric-build and pushes a minimal Docker image to GHCR.
# The baker's Dockerfile uses this image so CI never recompiles Godot from source.
#
# Run manually when world-godot updates or a new binary is needed.
# The resulting image is private: ghcr.io/v-sekai-fire/godot-editor-double

on:
  workflow_dispatch:
  schedule:
    # Weekly on Mondays — picks up world-godot updates automatically
    - cron: "0 2 * * 1"

jobs:
  build-godot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout baker repo
        uses: actions/checkout@v4

      - name: Checkout world-godot source
        uses: actions/checkout@v4
        with:
          repository: V-Sekai-fire/multiplayer-fabric-build
          ref: b27142e94c755c771e97d38bd4cdcb3bc97ba2dc
          path: godot-src
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get world-godot commit SHA
        id: godot-sha
        run: echo "sha=$(git -C godot-src rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push Godot binary image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/godot-binary/Dockerfile
          build-contexts: |
            godot-src=godot-src
          push: true
          tags: |
            ghcr.io/v-sekai-fire/godot-editor-double:latest
            ghcr.io/v-sekai-fire/godot-editor-double:${{ steps.godot-sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
